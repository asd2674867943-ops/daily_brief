name: Daily News
on:
  schedule:
    - cron: '10 14 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests feedparser anthropic python-dateutil
      - env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_and_summarize.py
      - run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "bot"
          git add docs/data/
          git diff --staged --quiet || git commit -m "auto update"
          git push
