name: Daily News
on:
  schedule:
    - cron: '10 14 * * *'
  workflow_dispatch:
permissions:
  contents: write  # 必须开启写入权限，否则无法更新 data.json
jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests feedparser google-generativeai python-dateutil
      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # 确保这里用的是 GEMINI 的 Key
        run: python main.py # 确认你的文件名是 main.py 还是在 scripts 文件夹下
      - name: Commit and push changes
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "bot"
          git add data/data.json
          git diff --staged --quiet || (git commit -m "auto update news data" && git push)
